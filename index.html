<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>kyuu.gg Workspace</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&display=swap"
            rel="stylesheet"
        />
        <link rel="icon" href="./assets/kyuugglogo.png" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="top-container">
            <div id="header" class="border-container">
                <h1 id="header-heading">kyuu.gg Workspace</h1>
            </div>
        </div>
        <div id="bottom-container">
            <div id="sidebar" class="border-container">
                <nav id="sidebar-nav">
                    <button class="nav-button" id="notes">Notes</button>
                </nav>
            </div>
            <div id="content" class="border-container">
                <div id="content-container">
                    <div id="placeholder">
                        <h2 id="placeholder-heading">
                            Nothing to show here... yet?
                        </h2>
                        <p id="placeholder-paragraph">
                            Select a module on the left
                        </p>
                    </div>
                    <div id="notes-container" class="hidden">
                        <div id="notes-main-container">
                            <h2 id="notes-main-heading">Your Notes</h2>
                        </div>
                        <div id="notes-create-container">
                            <button class="notes-button" id="notes-create">
                                Create new Note
                            </button>
                            <input
                                id="notes-text-heading"
                                class="notes-text"
                                placeholder="Heading"
                                hidden
                            />
                            <textarea
                                name="asdf"
                                id="notes-text-content"
                                class="notes-text"
                                placeholder="Content"
                                hidden
                            ></textarea>
                            <button
                                class="notes-button"
                                id="notes-finish"
                                hidden
                            >
                                Finish Note
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="./notes.js"></script>
        <script type="module" src="./script.js"></script>
    </body>
</html>
